name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: deploy-finalwhite
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test
        run: |
          sleep 5
          curl -sf -o /dev/null -w "Status: %{http_code}\n" https://finalwhite.lol/ || echo "(站点检查失败,但部署可能仍成功)"
